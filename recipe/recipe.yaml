schema_version: 1

context:
  name: dirsync
  version: 2.2.6

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/dirsync-${{ version }}.tar.gz
  sha256: 53b557ec5b54bda19c155cd04d7bb935f8b4a74450985f22a9f555a0360570bc

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv
  python:
    entry_points:
      - dirsync = dirsync.run:from_cmdline

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - six

tests:
  - python:
      imports:
        - dirsync
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - pip check
      - dirsync --help

about:
  summary: Advanced directory tree synchronisation tool
  license: MIT
  license_file: LICENSE.txt
  homepage: https://github.com/tkhyn/dirsync/

extra:
  recipe-maintainers:
    - jan-janssen
